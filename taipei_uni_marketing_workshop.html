<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg:#0a0a0f; --bg2:#111118; --ink:#f0f0f5; --mid:rgba(240,240,245,.55);

html{font-size:18px}
body{font-family:system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;width:100vw;height:100vh}

.slide{height:100vh;width:100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:clamp(2rem,4vw,4rem) clamp(2rem,5vw,5rem) 68px;background:var(--bg)}
.slide::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:clamp(40px,6vw,72px) clamp(40px,6vw,72px);z-index:0}
.slide::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(255,32,85,.08),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(59,130,246,.07),transparent 55%)}
.inner{position:relative;z-index:2;width:min(94vw,1080px);max-height:calc(100vh - 120px);overflow:hidden;scrollbar-width:none}
.inner::-webkit-scrollbar{display:none}
.slide-html .inner{overflow:auto}
.slide-content{opacity:0;transform:translateY(36px) scale(.97);transition:opacity .65s var(--ease-smooth),transform .65s var(--ease-out-back)}
.slide.is-visible .slide-content{opacity:1;transform:none}
.slide.is-visible .slide-content>*{animation:fade-up .55s var(--ease-out-back) both}
.slide.is-visible .slide-content>*:nth-child(1){animation-delay:.04s}
.slide.is-visible .slide-content>*:nth-child(2){animation-delay:.10s}
.slide.is-visible .slide-content>*:nth-child(3){animation-delay:.16s}
.slide.is-visible .slide-content>*:nth-child(4){animation-delay:.22s}
.slide.is-visible .slide-content>*:nth-child(5){animation-delay:.28s}
.slide.is-visible .slide-content>*:nth-child(6){animation-delay:.34s}
.slide.is-visible .slide-content>*:nth-child(7){animation-delay:.40s}
@keyframes fade-up{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:none}}
@keyframes aurora{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes unlock-bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}60%{transform:translateY(-4px)}}
.chip{display:inline-flex;align-items:center;gap:.4rem;font-size:.64rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:.28em .85em;border-radius:999px;border:1px solid;margin-bottom:.9rem;width:fit-content}
.chip-orange{color:var(--orange);border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.1)}
.chip-red{color:var(--red);border-color:rgba(255,32,85,.4);background:rgba(255,32,85,.1)}
.chip-blue{color:var(--blue);border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.1)}
.chip-purple{color:var(--purple);border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.1)}
.chip-green{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.chip-yellow{color:var(--yellow);border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1)}
.chip-cyan{color:var(--cyan);border-color:rgba(6,182,212,.4);background:rgba(6,182,212,.1)}
.chip-white{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.hero-txt{font-size:clamp(3.5rem,10vw,8rem);font-weight:800;line-height:1.0;letter-spacing:-0.035em}
h1{font-size:clamp(2.6rem,7vw,6rem);font-weight:800;line-height:1.03;letter-spacing:-0.03em}
h2{font-size:clamp(1.8rem,4vw,3.2rem);font-weight:700;line-height:1.06;letter-spacing:-0.02em}
h3{font-size:clamp(1.1rem,1.9vw,1.7rem);font-weight:600;line-height:1.2}
p,li{font-size:clamp(.95rem,1.5vw,1.2rem);line-height:1.75;color:var(--mid)}
strong{color:var(--ink);font-weight:700}
.g-orange{background:linear-gradient(135deg,#FF6B00,#FF9A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-red{background:linear-gradient(135deg,#FF2055,#FF6080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-blue{background:linear-gradient(135deg,#3B82F6,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-purple{background:linear-gradient(135deg,#A855F7,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-green{background:linear-gradient(135deg,#22C55E,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-cyan{background:linear-gradient(135deg,#06B6D4,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-multi{background:linear-gradient(135deg,#FF6B00,#FF2055,#A855F7,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.deck-list{list-style:none;margin-top:.9rem;display:flex;flex-direction:column;gap:.55rem}
.deck-list li{padding:.12rem 0 .12rem 1.5rem;position:relative;font-size:clamp(.95rem,1.5vw,1.15rem);color:var(--mid)}
.deck-list li::before{content:'▸';position:absolute;left:0;color:var(--orange);font-weight:800}
.tip-box{margin-top:1.1rem;padding:.85rem 1.2rem;border-left:3px solid var(--orange);border-radius:0 8px 8px 0;background:rgba(255,107,0,.08);font-size:clamp(.88rem,1.3vw,1rem);color:var(--ink);font-weight:500}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-top:1.3rem}
.cmp-card{border-radius:14px;padding:1.5rem;border:1.5px solid}
.cmp-no{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.cmp-yes{background:rgba(255,107,0,.07);border-color:rgba(255,107,0,.35)}
.cmp-card h3{font-size:clamp(.95rem,1.7vw,1.3rem);margin:.5rem 0 .4rem;color:var(--ink)}
.reveal-wrap{position:relative;margin-top:1.4rem;border-radius:16px;overflow:hidden;cursor:pointer;user-select:none}
.reveal-answer{background:linear-gradient(135deg,#1a0f2e,#0d1a2e);border:1.5px solid rgba(168,85,247,.3);border-radius:16px;padding:2rem 2.4rem;font-size:clamp(1rem,1.6vw,1.15rem);line-height:1.75;color:rgba(255,255,255,.85)}
.reveal-lock{position:absolute;inset:0;border-radius:16px;background:linear-gradient(135deg,#0d0d0d 60%,#1a1a2e);border:1.5px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .5s ease,transform .5s ease;z-index:3;padding:2rem;text-align:center}
.reveal-lock-icon{font-size:2.4rem;animation:unlock-bounce 2.5s ease-in-out infinite}
.reveal-lock-q{font-size:clamp(1.05rem,1.8vw,1.35rem);font-weight:600;color:var(--ink);max-width:560px;line-height:1.6}
.reveal-lock-hint{font-size:.65rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}
.conf-stamp{position:absolute;top:1rem;right:1.2rem;font-size:.6rem;font-weight:900;letter-spacing:.18em;color:rgba(255,32,85,.5);border:2px solid rgba(255,32,85,.35);border-radius:4px;padding:.2em .6em;text-transform:uppercase;transform:rotate(-4deg);z-index:4}
.reveal-wrap.revealed .reveal-lock{opacity:0;transform:scale(.95);pointer-events:none}
.reveal-wrap:not(.revealed):hover .reveal-lock{border-color:rgba(168,85,247,.3)}
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:1.4rem;margin-top:1.4rem}
.timer-display{font-size:clamp(5rem,16vw,11rem);font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;background:linear-gradient(135deg,var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:opacity .5s}
.timer-display.done{background:linear-gradient(135deg,var(--red),#ff6080);-webkit-background-clip:text;background-clip:text}
.timer-btn{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border:none;border-radius:8px;padding:.75rem 2.4rem;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .2s,transform .15s}
.timer-btn:hover{opacity:.85;transform:scale(1.04)}
.timer-btn.running{background:linear-gradient(135deg,#555,#333)}
.timer-reset-btn{background:transparent;color:var(--mid);border:1.5px solid var(--line);border-radius:8px;padding:.75rem 2rem;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s}
.timer-reset-btn:hover{border-color:var(--orange);color:var(--orange)}
#prog{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.06);z-index:900}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--red),var(--purple));transition:width .4s ease;width:0%}
#breadcrumb{position:fixed;top:2px;left:50%;transform:translateX(-50%);font-size:.6rem;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.4);background:rgba(15,15,20,.9);backdrop-filter:blur(12px);padding:.22rem .8rem;border-radius:0 0 6px 6px;z-index:901;white-space:nowrap;border:1px solid var(--line);border-top:none;text-transform:uppercase}
#sec-indicator{position:fixed;top:12px;right:16px;z-index:910;padding:.35rem .9rem;border-radius:999px;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.7);background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid var(--line);transition:all .25s;letter-spacing:.06em;text-transform:uppercase}
#dot-nav{position:fixed;right:18px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;z-index:900;max-height:70vh;overflow:hidden}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .25s;cursor:pointer;flex-shrink:0}
.dot.active{background:var(--orange);transform:scale(1.6)}
.dot.same-sec{background:rgba(255,107,0,.35)}
.nav-btn{position:fixed;z-index:900;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.07);backdrop-filter:blur(12px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:rgba(255,255,255,.6);transition:all .25s var(--ease-out-back)}
.nav-btn:hover{transform:scale(1.12);color:var(--orange);border-color:rgba(255,107,0,.4)}
#btn-prev{bottom:70px;right:70px}
#btn-next{bottom:70px;right:18px}
#counter{position:fixed;bottom:78px;left:20px;z-index:900;font-size:.65rem;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.08em;font-variant-numeric:tabular-nums}
#sec-nav{position:fixed;bottom:0;left:0;right:0;height:52px;background:rgba(8,8,12,.95);backdrop-filter:blur(20px);display:flex;align-items:stretch;z-index:950;border-top:1px solid var(--line)}
.sec-btn{flex:1;display:flex;align-items:center;justify-content:center;font-size:clamp(.58rem,.82vw,.74rem);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.3);cursor:pointer;border:none;background:transparent;border-right:1px solid var(--line);transition:color .2s,background .2s;border-top:2px solid transparent}
.sec-btn:last-child{border-right:none}
.sec-btn:hover{color:rgba(255,255,255,.8);background:rgba(255,107,0,.08)}
.sec-btn.active{color:#fff;background:rgba(255,107,0,.1);border-top-color:var(--orange)}
.bar{width:3rem;height:3px;background:linear-gradient(90deg,var(--orange),var(--red));border-radius:2px;margin:.6rem 0 1rem}
.body-content p{margin-bottom:.35rem;color:var(--mid)}
svg{overflow:visible}
</style>
</head>

<script>
const D=[
  {id:'s01',sec:1,sub:'開場',type:'cover',chip:['台北大學社群行銷工作坊 Day 2','white'],title:'設計思考',sub2:'主講：Vincent　14:00 – 16:00'},
  {id:'s02',sec:1,sub:'開場',type:'big-quote',chip:['下午跟早上不一樣','orange'],quote:'早上你學了怎麼<span class="g-orange">做圖</span>。<br>下午我們學<span class="g-red">為什麼做</span>。',sub2:'工具本身不創造商業價值。讓工具有意義的，是背後的策略判斷。'},
  {id:'s03',sec:1,sub:'開場',type:'profile',chip:['主講人介紹','white']},
  {id:'s04',sec:1,sub:'開場',type:'dark',chip:['課前說明','white'],title:'幾件事<br>先說清楚',bullets:['內容偏硬，但每一段都有實際應用的方法','可以拍照記錄','隨時可以舉手提問、打斷我','結束前會有一段實作練習']},
  {id:'s05',sec:1,sub:'創新三元',type:'venn',chip:['創新三元框架','blue'],title:'創新，需要三個<br>條件同時成立'},
  {id:'s06',sec:1,sub:'創新三元',type:'big-quote',chip:['關鍵問題','red'],quote:'你的東西，<br><span class="g-red">有人真的想要嗎？</span>',sub2:'不是有人說讚。是有人願意花時間、注意力、甚至金錢，去換取它。'},
  {id:'s07',sec:1,sub:'創新三元',type:'dark',chip:['為什麼多數產品會失敗','orange'],title:'問題不在執行，<br>在<span class="g-orange">切入點</span>',bullets:['CB Insights：42% 的新創失敗，原因是市場根本不需要這個東西','設計很好看，文字也通順，但沒有人在意','因為一開始就沒有問：誰的什麼痛？','這就是 Bottom-up 思維的代價']},
  {id:'s08',sec:1,sub:'創新三元',type:'compare',chip:['兩種思維方式','purple'],title:'工具腦 vs 戰略腦',left:{icon:'🔧',label:'工具腦（Bottom-up）',items:['先做出東西','再想能賣給誰','結果：沒有人買單','結論：設計需要再改']},right:{icon:'🎯',label:'戰略腦（Top-down）',items:['先定義誰在痛、痛什麼','再決定說什麼、怎麼說','讓設計服務這個目的','每個視覺選擇都有理由']}},
  {id:'s09',sec:1,sub:'設計思維',type:'dt-steps',chip:['設計思維 Design Thinking','cyan'],title:'先理解人，才設計物'},
  {id:'s10',sec:1,sub:'設計思維',type:'big-quote',chip:['設計思維：第一步','red'],quote:'Empathize<br><span class="g-red">先理解人</span>',sub2:'你不是在設計一個「東西」。你在設計一個「人的體驗」。從他的痛開始，不是從你的工具開始。'},
  {id:'s11',sec:1,sub:'設計思維',type:'dark',chip:['如何做到同理心','blue'],title:'了解你的用戶，<br>不靠<span class="g-blue">猜測</span>',bullets:['直接對話：問「上一次遇到這個問題是什麼時候」','觀察行為：他現在怎麼解決這個問題','注意他說不清楚的事：那裡藏著最大的機會','訪談 5 個真實的人，比問卷 500 人更有用']},
  {id:'s12',sec:1,sub:'設計思維',type:'dark',chip:['設計的次序','orange'],title:'順序<span class="g-orange">改變</span>結果',bullets:['❌ 做圖 → 發布 → 改設計 → 還是沒人買','✅ 找人 → 理解痛 → 定義問題 → 設計 → 測試','今天下午，我們要把這個框架裝進你的腦袋','讓你看作品的方式，從此不一樣'],footer:'設計思維的本質：讓你站在對的位置，問對的問題。'},
  {id:'s13',sec:1,sub:'戰略工具',type:'dark',chip:['戰略工具 1：MECE','yellow'],title:'把模糊的想法，<br>切成<span class="g-orange">清楚的結構</span>',bullets:['MECE：相互獨立，完全窮盡（Mutually Exclusive, Collectively Exhaustive）','每個分類不重疊（不重複說同一件事）','所有分類加起來涵蓋全局（不漏掉任何情況）','麥肯錫顧問的標配思考工具']},
  {id:'s14',sec:1,sub:'戰略工具',type:'dark',chip:['MECE 實際應用','yellow'],title:'用 MECE<br>切開你的<span class="g-orange">受眾</span>',content:'<p>你說：「我的受眾是年輕人。」MECE 這樣問：</p>',bullets:['幾歲到幾歲？有重疊嗎？（相互獨立）','學生 / 職場新人 / 自由工作者？（完全窮盡）','有這個痛 vs 沒有這個痛的人？','付費意願高 vs 低？有在找解法 vs 被動接受？'],footer:'目標不是分類完整，而是找到「最值得說話的那群」。'},
  {id:'s15',sec:1,sub:'戰略工具',type:'fermi-steps',chip:['戰略工具 2：費米估算','cyan'],title:'在資訊不完整時，<br>做出有邏輯的判斷'},
  {id:'s16',sec:1,sub:'戰略工具',type:'reveal',chip:['互動挑戰','red'],title:'費米估算練習',question:'全台灣一天賣出幾杯手搖飲？',answer:'推導過程：\n2,300 萬人 × 有飲料習慣 ~40% × 每週 2.5 杯 ÷ 7\n≈ 每天約 330 萬杯\n\n重點不是精確答案，是你有沒有辦法用邏輯推出一個可討論的數字。'},
  {id:'s17',sec:1,sub:'戰略工具',type:'dark',chip:['費米估算：為什麼重要','cyan'],title:'數字讓你的<br>判斷可以被<span class="g-blue">討論</span>',bullets:['沒有數字：「我覺得這個市場很大」','有數字：「台灣每年手搖飲市場約 400 億，只需要拿下 0.1%」','數字不需要百分百精確，需要有邏輯','讓你的 Pitch 從感覺，升格為判斷']},
  {id:'s18',sec:1,sub:'戰略工具',type:'big-quote',chip:['戰略的本質','purple'],quote:'好的策略，<br>是有系統地<br><span class="g-purple">縮小不確定性</span>',sub2:'不是找到完美答案，是用邏輯縮窄選項。'},
  {id:'s19',sec:1,sub:'切換準備',type:'dark',chip:['Section 1 小結','white'],title:'做圖之前，<br>先確認<span class="g-orange">三件事</span>',bullets:['你的受眾是誰？（不是「所有人」）','他有什麼真實的痛？（止痛藥，不是維他命）','為什麼你的設計能幫到他？（解法，不是裝飾）'],footer:'這三個問題的答案，決定了你的設計值不值得被看見。'},

function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function toggleTimer(id,tot){
  const d=document.getElementById('td-'+id),b=document.getElementById('tb-'+id);
  if(!d||!b)return;
  if(timers[id]){clearInterval(timers[id]);delete timers[id];b.textContent='繼續';b.classList.remove('running');return;}
  const p=d.textContent.split(':');let r=parseInt(p[0])*60+parseInt(p[1]);
  if(r<=0){r=tot;d.textContent=fmt(tot);d.classList.remove('done');}
  b.textContent='暫停';b.classList.add('running');
  timers[id]=setInterval(()=>{r--;d.textContent=fmt(r);if(r<=0){clearInterval(timers[id]);delete timers[id];d.classList.add('done');b.textContent='完成';b.classList.remove('running');}},1000);
}
function resetTimer(id,tot){
  if(timers[id]){clearInterval(timers[id]);delete timers[id];}
  const d=document.getElementById('td-'+id),b=document.getElementById('tb-'+id);
  if(d){d.textContent=fmt(tot);d.classList.remove('done');}
  if(b){b.textContent='開始';b.classList.remove('running');}
}

function cc(c){return`chip chip-${c||'white'}`}

function renderSlide(sd,idx){
  const sec=document.createElement('section');
  sec.className='slide';
  sec.dataset.index=idx;sec.dataset.id=sd.id;sec.dataset.sec=sd.sec;sec.dataset.sub=sd.sub;
  let h='';
  const chip=sd.chip?`<div class="${cc(sd.chip[1])}">${sd.chip[0]}</div>`:'';
  function blob(c1,c2){return`<div style="position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 70% at 20% 20%,${c1},transparent 55%),radial-gradient(ellipse 70% 80% at 80% 80%,${c2},transparent 55%);background-size:200% 200%;animation:aurora 18s ease-in-out infinite;"></div>`;}

  switch(sd.type){
    case 'cover':
      h+=blob('rgba(255,107,0,.12)','rgba(255,32,85,.09)');
      h+=`<div style="position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem">${chip}<div class="hero-txt g-multi">${sd.title}</div><div class="bar" style="margin:.6rem auto"></div><p style="font-size:clamp(1rem,1.8vw,1.3rem);color:var(--mid)">${sd.sub2}</p></div>`;
      break;
    case 'section-cover':{
      const cols={'②':['rgba(59,130,246,.14)','rgba(168,85,247,.1)'],'③':['rgba(34,197,94,.12)','rgba(6,182,212,.09)']};

        h+=`<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-top:3px solid ${s.col};border-radius:10px;padding:1.4rem 1.3rem"><div style="font-size:1.6rem;margin-bottom:.6rem">${s.icon}</div><div style="font-weight:800;font-size:clamp(1.1rem,1.8vw,1.35rem);color:${s.col};margin-bottom:.7rem">${s.label}</div><div style="font-size:clamp(.85rem,1.3vw,.98rem);line-height:1.65;color:var(--mid)">${s.desc}</div></div>`;
      });h+=`</div>`;break;
    case 'pitch-rest':
      h+=chip;h+=`<div class="bar"></div>`;if(sd.title)h+=`<h2 style="margin-bottom:1.2rem">${sd.title}</h2>`;
      h+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem">`;
      [{icon:'⏰',label:'Why Now',col:'rgba(255,255,255,.6)',desc:'現在為什麼是對的時機？市場條件、技術成熟度、社會趨勢？'},{icon:'📊',label:'Market',col:'var(--blue)',desc:'這個問題有多大？用費米估算說出一個可討論的數字。'},{icon:'💰',label:'Revenue',col:'var(--green)',desc:'你怎麼從這裡獲利？賣什麼、賣給誰、為什麼他會付？'},{icon:'🎯',label:'CTA',col:'var(--red)',desc:'一個清楚、低門檻的下一步。一個就夠，不要三個。'}].forEach(s=>{
        h+=`<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-top:3px solid ${s.col};border-radius:10px;padding:1.3rem 1.1rem"><div style="font-size:1.4rem;margin-bottom:.5rem">${s.icon}</div><div style="font-weight:800;font-size:clamp(.95rem,1.5vw,1.15rem);color:${s.col};margin-bottom:.5rem">${s.label}</div><div style="font-size:clamp(.8rem,1.2vw,.9rem);line-height:1.6;color:var(--mid)">${s.desc}</div></div>`;
      });h+=`</div>`;break;
    case 'pitch-demo':
      h+=chip;h+=`<div class="bar"></div>`;if(sd.title)h+=`<h2 style="margin-bottom:1rem">${sd.title}</h2>`;
      h+=`<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1.6rem 1.8rem;display:flex;flex-direction:column;gap:1rem;max-width:760px">`;
      [{tag:'Hook',col:'var(--red)',text:'你有沒有試過，很想找個人說說話，但想了半天不知道要說什麼？'},{tag:'Pain',col:'var(--orange)',text:'很多人晚上腦袋停不下來，但諮商太貴，朋友也不好打擾，最後只能一個人耗著。'},{tag:'Solution',col:'var(--blue)',text:'EmoTree 是一個情緒陪伴 AI，它不給答案，它幫你把混亂說清楚，讓你看見你在哪裡。'},{tag:'CTA',col:'var(--green)',text:'掃碼試用，感受一次什麼叫被聽見。'}].forEach(d=>{
        h+=`<div style="display:flex;gap:1rem;align-items:flex-start"><span style="background:${d.col};border-radius:4px;padding:.2rem .6rem;font-size:.6rem;font-weight:800;color:#fff;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;margin-top:.2rem;flex-shrink:0">${d.tag}</span><p style="color:var(--ink);font-size:clamp(.95rem,1.6vw,1.15rem);line-height:1.65;margin:0">${d.text}</p></div>`;
      });
      h+=`<div style="margin-top:.6rem;padding-top:.8rem;border-top:1px solid rgba(255,255,255,.07);font-size:.72rem;color:rgba(255,255,255,.3);text-align:center;letter-spacing:.06em">全長約 25–30 秒 · 四句話 · 清楚有力</div></div>`;break;
    case 'pitch-template':
      h+=chip;h+=`<div class="bar"></div>`;if(sd.title)h+=`<h2 style="margin-bottom:1rem">${sd.title}</h2>`;
      h+=`<div style="display:flex;flex-direction:column;gap:.7rem;max-width:720px">`;
      [{label:'🪝 Hook',col:'var(--red)',ph:'前 5 秒的問句或反常識句子。讓他停下來。'},{label:'😣 Pain',col:'var(--orange)',ph:'描述他的具體痛苦情境。讓他點頭說「對！」'},{label:'💡 Solution',col:'var(--blue)',ph:'你的作品如何回應那個痛。說結果，不說功能。'},{label:'🎯 CTA',col:'var(--green)',ph:'一個清楚的行動。「掃碼 / 試用 / 找我聊聊」。'}].forEach(b=>{
        h+=`<div style="display:flex;align-items:stretch;border-radius:8px;overflow:hidden;border:1px solid ${b.col}"><div style="background:${b.col};padding:.75rem 1rem;display:flex;align-items:center;min-width:100px;justify-content:center"><span style="color:#fff;font-weight:800;font-size:.82rem;text-align:center;line-height:1.3">${b.label}</span></div><div style="flex:1;background:rgba(255,255,255,.03);padding:.75rem 1.2rem;display:flex;align-items:center"><span style="color:rgba(255,255,255,.3);font-size:clamp(.88rem,1.4vw,1rem);font-style:italic">${b.ph}</span></div></div>`;
      });h+=`</div>`;break;
    case 'checklist':
      h+=chip;h+=`<div class="bar"></div>`;if(sd.title)h+=`<h2 style="margin-bottom:1.2rem">${sd.title}</h2>`;
      h+=`<div style="display:flex;flex-direction:column;gap:1rem;max-width:680px">`;
      sd.items.forEach(it=>{h+=`<div style="display:flex;align-items:center;gap:1.2rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-left:3px solid ${it.c};border-radius:8px;padding:1.1rem 1.4rem"><div style="font-size:1.4rem">✓</div><div><div style="font-weight:700;color:var(--ink);font-size:clamp(1rem,1.7vw,1.2rem)">${it.q}</div><div style="color:var(--mid);font-size:.88rem;margin-top:.2rem">${it.a}</div></div></div>`;});
      h+=`</div>`;if(sd.footer)h+=`<div class="tip-box" style="max-width:680px;margin-top:1rem">${sd.footer}</div>`;break;
    case 'resources':
      h+=chip;h+=`<div class="bar"></div>`;if(sd.title)h+=`<h2 style="margin-bottom:1.2rem">${sd.title}</h2>`;
      h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;max-width:760px">`;
      [{icon:'🔗',label:'LinkedIn',desc:'加 Vincent 的 LinkedIn<br>持續獲取洞察',border:'rgba(255,255,255,.1)',hl:false},{icon:'🌿',label:'EmoTree',desc:'情緒陪伴 AI<br>掃碼免費體驗',border:'var(--red)',hl:true},{icon:'📋',label:'課程框架',desc:'三元框架 · Persona→HXC<br>Pitch 結構 · GTM 路徑',border:'rgba(255,255,255,.1)',hl:false}].forEach(r=>{
        h+=`<div style="background:rgba(255,255,255,.04);border:1px solid ${r.border};border-radius:12px;padding:1.5rem 1.3rem;text-align:center"><div style="width:72px;height:72px;background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.12);border-radius:10px;margin:0 auto .8rem;display:flex;align-items:center;justify-content:center;font-size:1.8rem">${r.icon}</div><div style="font-weight:700;font-size:1rem;color:${r.hl?'var(--red)':'var(--ink)'};margin-bottom:.4rem">${r.label}</div><div style="font-size:.83rem;color:var(--mid);line-height:1.5">${r.desc}</div></div>`;
      });h+=`</div>`;break;
    default:
      h+=chip;h+=`<h2>${sd.id}</h2>`;
  }
  const inner=document.createElement('div');
  inner.className='inner slide-content';
  inner.innerHTML=h;
  sec.appendChild(inner);
  return sec;
}

const slideEls=[];
D.forEach((sd,idx)=>{const el=renderSlide(sd,idx);container.appendChild(el);slideEls.push(el);});

const dotNav=document.getElementById('dot-nav');
D.forEach((sd,idx)=>{
  const d=document.createElement('div');d.className='dot';d.dataset.idx=idx;
  d.title=`${idx+1}. ${sd.sub}`;d.addEventListener('click',()=>scrollToSlide(idx));dotNav.appendChild(d);
});

function updateUI(){
  const sd=D[cur];const pct=total>1?(cur/(total-1))*100:0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('counter').textContent=`${cur+1} / ${total}`;
  document.getElementById('breadcrumb').textContent=`Section ${sd.sec}  ·  ${sd.sub}`;
  document.getElementById('sec-indicator').textContent=secNames[sd.sec]||'';
  document.querySelectorAll('.sec-btn').forEach(btn=>{btn.classList.toggle('active',parseInt(btn.dataset.sec)===sd.sec);});
  document.querySelectorAll('.dot').forEach(d=>{
    const i=parseInt(d.dataset.idx);
    d.classList.toggle('active',i===cur);
    d.classList.toggle('same-sec',D[i].sec===sd.sec&&i!==cur);
  });
}

function scrollToSlide(idx){
  idx=Math.max(0,Math.min(idx,total-1));
  slideEls[idx]?.scrollIntoView({behavior:'smooth',block:'start'});
  cur=idx;updateUI();
}
function jumpToSection(sec){const idx=secStarts[sec];if(idx!==undefined)scrollToSlide(idx);}

document.getElementById('btn-prev').addEventListener('click',()=>scrollToSlide(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>scrollToSlide(cur+1));
document.addEventListener('keydown',e=>{
  if(['ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();scrollToSlide(cur+1);}
  if(['ArrowUp','PageUp'].includes(e.key)){e.preventDefault();scrollToSlide(cur-1);}
  if(e.key==='Home'){e.preventDefault();scrollToSlide(0);}
  if(e.key==='End'){e.preventDefault();scrollToSlide(total-1);}
});
let wlk=false;
document.addEventListener('wheel',e=>{if(wlk)return;wlk=true;scrollToSlide(e.deltaY>0?cur+1:cur-1);setTimeout(()=>wlk=false,850);},{passive:true});
let tsY=0;
document.addEventListener('touchstart',e=>{tsY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{const dy=tsY-e.changedTouches[0].clientY;if(Math.abs(dy)>50)scrollToSlide(dy>0?cur+1:cur-1);},{passive:true});

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('is-visible');
      const i=parseInt(entry.target.dataset.index);
      if(!isNaN(i)){cur=i;updateUI();}
    }else{entry.target.classList.remove('is-visible');}
  });
},{threshold:0.5});
slideEls.forEach(el=>observer.observe(el));
updateUI();
</script>
</body>
