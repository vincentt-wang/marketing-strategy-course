<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略思維工作坊 — 需求探索、價值提案與成果表達 · 台北大學 Day 2 · Vincent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--ink:#f0f0f5;--mid:rgba(240,240,245,.55);
  --line:rgba(255,255,255,.08);
  --orange:#FF6B00;--red:#FF2055;--blue:#3B82F6;--purple:#A855F7;
  --green:#22C55E;--yellow:#FBBF24;--cyan:#06B6D4;
  --ease-back:cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth:cubic-bezier(0.4,0.0,0.2,1);
  /* 最小字體規範 */
  --min-font:clamp(0.9rem,1.3vw,1.05rem);
  --min-label:clamp(0.78rem,1.1vw,0.9rem);
}
html{font-size:18px}
body{font-family:system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;width:100vw;height:100vh}
#slides-container{height:100vh;width:100vw;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;position:fixed;inset:0;scrollbar-width:none}
#slides-container::-webkit-scrollbar{display:none}
.slide{height:100vh;width:100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:clamp(2rem,4vw,4rem) clamp(2rem,5vw,5rem) 68px}
.slide[data-sec="1"]{background:linear-gradient(180deg,#0a0a0f 0%,#0f0a15 50%,#150a12 100%)}
.slide[data-sec="2"]{background:linear-gradient(180deg,#150a12 0%,#0a0f18 50%,#0a1520 100%)}
.slide[data-sec="3"]{background:linear-gradient(180deg,#0a1520 0%,#0a150f 50%,#0f1510 100%)}
.slide::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:clamp(40px,6vw,72px) clamp(40px,6vw,72px);z-index:0}
.slide::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}
.slide[data-sec="1"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(255,32,85,.06),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(168,85,247,.05),transparent 55%)}
.slide[data-sec="2"]::after{background:radial-gradient(ellipse 70% 60% at 20% 20%,rgba(59,130,246,.06),transparent 55%),radial-gradient(ellipse 55% 70% at 80% 80%,rgba(255,32,85,.05),transparent 55%)}
.slide[data-sec="3"]::after{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(34,197,94,.06),transparent 55%),radial-gradient(ellipse 55% 70% at 85% 85%,rgba(6,182,212,.05),transparent 55%)}
.inner{position:relative;z-index:2;width:min(94vw,1080px);max-height:calc(100vh - 120px);overflow:hidden;scrollbar-width:none}
.inner::-webkit-scrollbar{display:none}
.slide-content{opacity:0;transform:translateY(32px) scale(.97);transition:opacity .6s var(--ease-smooth),transform .6s var(--ease-back)}
.slide.is-visible .slide-content{opacity:1;transform:none}
.slide.is-visible .slide-content>*{animation:fade-up .5s var(--ease-back) both}
.slide.is-visible .slide-content>*:nth-child(1){animation-delay:.04s}
.slide.is-visible .slide-content>*:nth-child(2){animation-delay:.10s}
.slide.is-visible .slide-content>*:nth-child(3){animation-delay:.16s}
.slide.is-visible .slide-content>*:nth-child(4){animation-delay:.22s}
.slide.is-visible .slide-content>*:nth-child(5){animation-delay:.28s}
.slide.is-visible .slide-content>*:nth-child(6){animation-delay:.34s}
.slide.is-visible .slide-content>*:nth-child(7){animation-delay:.40s}
@keyframes fade-up{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:none}}
@keyframes aurora{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes lock-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
@keyframes carousel-slide{0%,20%{opacity:1}25%,95%{opacity:0}100%{opacity:1}}

/* 照片輪播 */
.carousel-wrap{position:relative;width:min(520px,85vw);aspect-ratio:16/10;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.carousel-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease}
.carousel-wrap img.active{opacity:1}
.carousel-dots{display:flex;gap:.5rem;margin-top:.8rem}
.carousel-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s}
.carousel-dots span.active{background:var(--orange);transform:scale(1.2)}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:.4rem;font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:.28em .85em;border-radius:999px;border:1px solid;margin-bottom:.85rem;width:fit-content}
.chip-orange{color:var(--orange);border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.1)}
.chip-red{color:var(--red);border-color:rgba(255,32,85,.4);background:rgba(255,32,85,.1)}
.chip-blue{color:var(--blue);border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.1)}
.chip-purple{color:var(--purple);border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.1)}
.chip-green{color:var(--green);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.chip-yellow{color:var(--yellow);border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1)}
.chip-cyan{color:var(--cyan);border-color:rgba(6,182,212,.4);background:rgba(6,182,212,.1)}
.chip-white{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}

/* TYPOGRAPHY */
.hero-txt{font-size:clamp(3.5rem,10vw,8rem);font-weight:800;line-height:1.0;letter-spacing:-0.035em}
h1{font-size:clamp(2.4rem,6.5vw,5.5rem);font-weight:800;line-height:1.04;letter-spacing:-0.03em}
h2{font-size:clamp(1.6rem,3.6vw,3rem);font-weight:700;line-height:1.08;letter-spacing:-0.02em}
h3{font-size:clamp(1rem,1.8vw,1.6rem);font-weight:600;line-height:1.2}
p,li{font-size:clamp(.9rem,1.45vw,1.15rem);line-height:1.75;color:var(--mid)}
strong{color:var(--ink);font-weight:700}
.g-orange{background:linear-gradient(135deg,#FF6B00,#FF9A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-red{background:linear-gradient(135deg,#FF2055,#FF6080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-blue{background:linear-gradient(135deg,#3B82F6,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-purple{background:linear-gradient(135deg,#A855F7,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-green{background:linear-gradient(135deg,#22C55E,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-cyan{background:linear-gradient(135deg,#06B6D4,#22D3EE);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.g-multi{background:linear-gradient(135deg,#FF6B00,#FF2055,#A855F7,#3B82F6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* UTIL */
.bar{width:2.8rem;height:3px;background:linear-gradient(90deg,var(--orange),var(--red));border-radius:2px;margin:.6rem 0 1rem}
.deck-list{list-style:none;margin-top:.85rem;display:flex;flex-direction:column;gap:.5rem}
.deck-list li{padding:.1rem 0 .1rem 1.5rem;position:relative;font-size:clamp(.9rem,1.45vw,1.1rem);color:var(--mid)}
.deck-list li::before{content:'▸';position:absolute;left:0;color:var(--orange);font-weight:800}
.tip-box{margin-top:1rem;padding:.8rem 1.2rem;border-left:3px solid var(--orange);border-radius:0 8px 8px 0;background:rgba(255,107,0,.08);font-size:clamp(.85rem,1.25vw,.98rem);color:var(--ink);font-weight:500}
.body-content p{margin-bottom:.3rem;color:var(--mid)}
svg{overflow:visible}

/* ORIGINAL SINGLE REVEAL */
.reveal-wrap{position:relative;margin-top:1.2rem;border-radius:14px;overflow:hidden;cursor:pointer;user-select:none}
.reveal-answer{background:linear-gradient(135deg,#1a0f2e,#0d1a2e);border:1.5px solid rgba(168,85,247,.3);border-radius:14px;padding:1.8rem 2.2rem;font-size:clamp(.95rem,1.5vw,1.1rem);line-height:1.75;color:rgba(255,255,255,.85)}
.reveal-lock{position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,#0d0d0d 60%,#1a1a2e);border:1.5px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;transition:opacity .45s ease,transform .45s ease;z-index:3;padding:2rem;text-align:center}
.reveal-lock-icon{color:rgba(255,255,255,.5);animation:lock-pulse 2.5s ease-in-out infinite}
.reveal-lock-q{font-size:clamp(1rem,1.7vw,1.3rem);font-weight:600;color:var(--ink);max-width:560px;line-height:1.6}
.reveal-lock-hint{font-size:.62rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}
.conf-stamp{position:absolute;top:.8rem;right:1rem;font-size:.58rem;font-weight:900;letter-spacing:.18em;color:rgba(255,32,85,.5);border:2px solid rgba(255,32,85,.35);border-radius:4px;padding:.2em .6em;text-transform:uppercase;transform:rotate(-4deg);z-index:4}
.reveal-wrap.revealed .reveal-lock{opacity:0;transform:scale(.94);pointer-events:none}
.reveal-wrap:not(.revealed):hover .reveal-lock{border-color:rgba(168,85,247,.35)}

/* MULTI-REVEAL GRID */
.mrev-grid{display:grid;gap:.9rem;margin-top:1rem}
.mrev-grid.cols-2{grid-template-columns:1fr 1fr}
.mrev-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.mrev-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}
.unlock-card{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;user-select:none;min-height:140px}
.unlock-card .card-answer{border-radius:12px;padding:1.3rem 1.4rem;height:100%;display:flex;flex-direction:column;gap:.5rem}
.unlock-card .card-mask{position:absolute;inset:0;border-radius:12px;background:#0d0d14;border:1.5px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;transition:opacity .4s ease,transform .4s var(--ease-back);z-index:2;padding:1rem;text-align:center;overflow:hidden}
.unlock-card .card-answer{visibility:hidden}
.unlock-card.unlocked .card-answer{visibility:visible}
.unlock-card .card-mask::after{content:'';position:absolute;top:0;left:-100%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 3s ease-in-out infinite}
.unlock-card .card-mask-num{font-size:1.6rem;font-weight:800;color:rgba(255,255,255,.15)}
.unlock-card .card-mask-q{font-size:clamp(.78rem,1.25vw,.92rem);font-weight:600;color:rgba(255,255,255,.55);line-height:1.5;max-width:200px}
.unlock-card .card-mask-hint{font-size:var(--min-label);color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
.unlock-card.unlocked .card-mask{opacity:0;transform:scale(.88);pointer-events:none}
.unlock-card .card-label{font-size:var(--min-label);font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.2rem}
.unlock-card .card-title{font-size:clamp(.92rem,1.55vw,1.1rem);font-weight:700;color:var(--ink);line-height:1.3}
.unlock-card .card-body{font-size:clamp(.78rem,1.22vw,.9rem);color:var(--mid);line-height:1.6;margin-top:.3rem}
.unlock-card:not(.unlocked):hover .card-mask{border-color:rgba(255,255,255,.22)}

/* STEP REVEAL */
.step-reveal-wrap{display:flex;flex-direction:column;gap:.7rem;margin-top:.9rem}
.step-item{border-radius:10px;overflow:hidden;cursor:pointer;user-select:none}
.step-item .step-front{display:flex;align-items:center;gap:1rem;padding:.85rem 1.25rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;transition:border-color .2s,background .2s}
.step-item .step-num{font-size:.95rem;font-weight:800;min-width:1.7rem;flex-shrink:0}
.step-item .step-q{font-size:clamp(.85rem,1.4vw,.98rem);font-weight:600;color:var(--ink)}
.step-item .step-lock{font-size:.8rem;margin-left:auto;opacity:.35;transition:opacity .2s,transform .3s}
.step-item .step-back{max-height:0;overflow:hidden;transition:max-height .42s var(--ease-smooth),opacity .32s ease;opacity:0;background:rgba(255,107,0,.06);border-radius:0 0 10px 10px}
.step-item.open .step-front{border-color:rgba(255,107,0,.4);background:rgba(255,107,0,.08);border-radius:10px 10px 0 0}
.step-item.open .step-lock{opacity:0;transform:rotate(90deg)}
.step-item.open .step-back{max-height:180px;opacity:1}
.step-item:not(.open):hover .step-front{border-color:rgba(255,255,255,.18)}
.step-back-inner{padding:.75rem 1.25rem .95rem;font-size:clamp(.83rem,1.3vw,.96rem);color:rgba(255,255,255,.8);line-height:1.65}
.step-back-inner strong{color:var(--orange)}

/* COMPARE CARDS with mask */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:1rem}
.cmp-card{border-radius:12px;padding:1.4rem;border:1.5px solid;position:relative;overflow:hidden}
.cmp-no{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.1)}
.cmp-yes{background:rgba(255,107,0,.07);border-color:rgba(255,107,0,.3)}
.cmp-card h3{font-size:clamp(.9rem,1.55vw,1.18rem);margin:.4rem 0 .35rem;color:var(--ink)}
.cmp-card .cmp-mask{position:absolute;inset:0;background:#0c0c14;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;cursor:pointer;transition:opacity .4s ease,transform .4s var(--ease-back);z-index:2;overflow:hidden}
.cmp-card:not(.revealed) > :not(.cmp-mask){visibility:hidden}
.cmp-card.revealed > :not(.cmp-mask){visibility:visible}
.cmp-card .cmp-mask::after{content:'';position:absolute;top:0;left:-100%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 3s .5s ease-in-out infinite}
.cmp-card .cmp-mask-icon{font-size:1.9rem}
.cmp-card .cmp-mask-label{font-size:.65rem;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem}
.cmp-card.revealed .cmp-mask{opacity:0;transform:scale(.92);pointer-events:none}
.cmp-card:not(.revealed):hover .cmp-mask{background:#111120}

/* VENN */
.venn-circle{cursor:pointer;transition:opacity .3s}
.venn-circle.dim{opacity:.3}
.venn-label-group{cursor:pointer;transition:opacity .3s}
.venn-label-group.dim{opacity:.25}
.venn-detail-box{margin-top:.8rem;padding:.8rem 1.3rem;border-radius:8px;border-left:3px solid;font-size:clamp(.83rem,1.32vw,.97rem);line-height:1.65;color:var(--ink);transition:opacity .3s,transform .3s;min-height:3rem}
.venn-detail-box.hidden{opacity:0;transform:translateY(6px);pointer-events:none}

/* FUNNEL */
.funnel-layer{cursor:pointer;transition:opacity .3s}
.funnel-layer.dim{opacity:.28}

/* TIMER */
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:1.2rem;margin-top:1.2rem}
.timer-display{font-size:clamp(5rem,15vw,10rem);font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;background:linear-gradient(135deg,var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.timer-display.done{background:linear-gradient(135deg,var(--red),#ff6080);-webkit-background-clip:text;background-clip:text}
.timer-btn{background:linear-gradient(135deg,var(--orange),var(--red));color:#fff;border:none;border-radius:8px;padding:.7rem 2.2rem;font-size:.95rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .2s,transform .15s}
.timer-btn:hover{opacity:.85;transform:scale(1.04)}
.timer-btn.running{background:linear-gradient(135deg,#555,#333)}
.timer-reset-btn{background:transparent;color:var(--mid);border:1.5px solid var(--line);border-radius:8px;padding:.7rem 1.8rem;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s}
.timer-reset-btn:hover{border-color:var(--orange);color:var(--orange)}

/* PROFILE — centered layout with slide-up photos */
.profile-wrap{display:flex;flex-direction:column;align-items:center;gap:1.2rem;text-align:center;width:100%}
.profile-header{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.profile-cards-row{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center;width:100%;max-width:900px}
.profile-card{border-radius:14px;cursor:pointer;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.1);transition:all .3s var(--ease-back);width:280px;text-align:left;flex-shrink:0;position:relative;overflow:hidden}
.profile-card:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.05);transform:translateY(-3px)}
.profile-card.pc-open{border-color:rgba(255,107,0,.6);background:rgba(255,107,0,.08)}
.profile-card .pc-front{padding:.9rem 1.15rem;display:flex;align-items:center;gap:.8rem}
.profile-card .pc-icon{width:2rem;height:2rem;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.profile-card .pc-icon svg{width:100%;height:100%}
.profile-card .pc-front-label{font-size:var(--min-label);font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.12rem}
.profile-card .pc-front-title{font-size:clamp(.88rem,1.4vw,1rem);font-weight:700;color:var(--ink);line-height:1.3}
.profile-card .pc-arrow{margin-left:auto;font-size:1rem;color:rgba(255,255,255,.25);transition:transform .35s var(--ease-back),color .25s;flex-shrink:0}
.profile-card.pc-open .pc-arrow{transform:rotate(90deg);color:var(--orange)}
/* slide-up photo gallery below all cards */
.profile-gallery{width:100%;max-width:900px;display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;min-height:0;overflow:hidden}
.profile-photo-slot{width:280px;height:0;opacity:0;overflow:hidden;border-radius:14px;transition:height .45s var(--ease-back),opacity .35s ease,transform .45s var(--ease-back);transform:translateY(30px);position:relative}
.profile-photo-slot.visible{height:260px;opacity:1;transform:translateY(0)}
.profile-photo-slot img{width:100%;height:100%;object-fit:cover;display:block}
.profile-photo-slot .photo-cap{position:absolute;bottom:0;left:0;right:0;padding:.6rem .8rem;background:linear-gradient(transparent,rgba(0,0,0,.75));font-size:.72rem;color:rgba(255,255,255,.9);line-height:1.4}

/* TRIAD — three interactive orbs */
.triad-wrap{display:flex;align-items:stretch;gap:1rem;margin-top:1.1rem;flex-wrap:nowrap}
.triad-orb{flex:1;border-radius:16px;border:1.5px solid;cursor:pointer;user-select:none;overflow:hidden;transition:transform .3s var(--ease-back),box-shadow .35s ease,border-color .3s ease}
.triad-orb:not(.to-open):hover{transform:translateY(-4px)}
.triad-orb.to-open{transform:translateY(-3px)}
.triad-orb-front{padding:1.6rem 1.3rem 1.3rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:.6rem}
.triad-orb-circle{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .15rem;position:relative;flex-shrink:0;transition:box-shadow .35s ease}
.triad-orb.to-open .triad-orb-circle{box-shadow:0 0 28px rgba(255,255,255,.1)}
.triad-orb-en{font-size:var(--min-label);font-weight:800;letter-spacing:.16em;text-transform:uppercase;margin-bottom:.08rem;transition:opacity .2s}
.triad-orb-zh{font-size:clamp(1.2rem,2.2vw,1.6rem);font-weight:800;line-height:1.1}
.triad-orb-tagline{font-size:clamp(.76rem,1.22vw,.88rem);color:var(--mid);line-height:1.55}
.triad-orb-hint{font-size:var(--min-label);letter-spacing:.1em;text-transform:uppercase;opacity:.28;margin-top:.25rem;transition:opacity .2s}
.triad-orb.to-open .triad-orb-hint{opacity:0}
/* expanded detail panel */
.triad-detail{max-height:0;overflow:hidden;transition:max-height .45s var(--ease-smooth),opacity .32s ease;opacity:0;border-top:1px solid rgba(255,255,255,.07)}
.triad-orb.to-open .triad-detail{max-height:420px;opacity:1}
.triad-detail-inner{padding:1rem 1.3rem 1.2rem;display:flex;flex-direction:column;gap:.6rem}
.triad-det-row{display:flex;gap:.6rem;align-items:flex-start}
.triad-det-tag{font-size:.5rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.2em .6em;border-radius:4px;color:#fff;white-space:nowrap;margin-top:.18rem;flex-shrink:0}
.triad-det-txt{font-size:clamp(.78rem,1.25vw,.88rem);line-height:1.68;color:rgba(255,255,255,.78)}

function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

// 照片輪播功能
const carouselTimers={};
function carouselGo(id,idx){
  const wrap=document.getElementById(id);
  const dots=document.getElementById(id+'-dots');
  if(!wrap)return;
  wrap.querySelectorAll('img').forEach((img,i)=>{img.classList.toggle('active',i===idx);});
  if(dots)dots.querySelectorAll('span').forEach((dot,i)=>{dot.classList.toggle('active',i===idx);});
}
function startCarousel(id,count){
  if(carouselTimers[id])return;
  let idx=0;
  carouselTimers[id]=setInterval(()=>{idx=(idx+1)%count;carouselGo(id,idx);},3500);
}
function initCarousels(){
  document.querySelectorAll('.carousel-wrap').forEach(wrap=>{
    const id=wrap.id;
    const count=wrap.querySelectorAll('img').length;
    if(count>1)startCarousel(id,count);
  });
}

function toggleTimer(id,tot){
  const d=document.getElementById('td-'+id),b=document.getElementById('tb-'+id);
  if(!d||!b)return;
  if(timers[id]){clearInterval(timers[id]);delete timers[id];b.textContent='繼續';b.classList.remove('running');return;}
  const p=d.textContent.split(':');let r=parseInt(p[0])*60+parseInt(p[1]);
  if(r<=0){r=tot;d.textContent=fmt(tot);d.classList.remove('done');}
  b.textContent='暫停';b.classList.add('running');
  timers[id]=setInterval(()=>{r--;d.textContent=fmt(r);if(r<=0){clearInterval(timers[id]);delete timers[id];d.classList.add('done');b.textContent='完成';b.classList.remove('running');}},1000);
}
function resetTimer(id,tot){
  if(timers[id]){clearInterval(timers[id]);delete timers[id];}
  const d=document.getElementById('td-'+id),b=document.getElementById('tb-'+id);
  if(d){d.textContent=fmt(tot);d.classList.remove('done');}
  if(b){b.textContent='開始';b.classList.remove('running');}
}

function funnelFocus(fid,key){
  const svg=document.getElementById('funnel-'+fid);
  const box=document.getElementById('fd-'+fid);
  if(!svg||!box)return;
  ['p','i','h'].forEach(k=>{
    const el=svg.querySelector('#fl-'+k+'-'+fid);
    if(el)el.classList.toggle('dim',k!==key);
  });
  const d=funnelData[key];
  if(d){box.style.borderColor=d.col;box.innerHTML=d.text;box.style.opacity='1';}
}

const slideEls=[];
D.forEach((sd,idx)=>{const el=renderSlide(sd,idx);container.appendChild(el);slideEls.push(el);});

// 初始化照片輪播
setTimeout(initCarousels,500);

const dotNav=document.getElementById('dot-nav');
D.forEach((sd,idx)=>{
  const d=document.createElement('div');d.className='dot';d.dataset.idx=idx;
  d.title=`${idx+1}. ${sd.sub}`;d.addEventListener('click',()=>scrollToSlide(idx));dotNav.appendChild(d);
});

function updateUI(){
  const sd=D[cur];const pct=total>1?(cur/(total-1))*100:0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('counter').textContent=`${cur+1} / ${total}`;
  document.getElementById('breadcrumb').textContent=`Section ${sd.sec}  ·  ${sd.sub}`;
  document.getElementById('sec-indicator').textContent=secNames[sd.sec]||'';
  document.querySelectorAll('.sec-btn').forEach(btn=>{btn.classList.toggle('active',parseInt(btn.dataset.sec)===sd.sec);});
  document.querySelectorAll('.dot').forEach(d=>{
    const i=parseInt(d.dataset.idx);
    d.classList.toggle('active',i===cur);
    d.classList.toggle('same-sec',D[i].sec===sd.sec&&i!==cur);
  });
}
function scrollToSlide(idx){
  idx=Math.max(0,Math.min(idx,total-1));
  slideEls[idx]?.scrollIntoView({behavior:'smooth',block:'start'});
  cur=idx;updateUI();
}
function jumpToSection(sec){const idx=secStarts[sec];if(idx!==undefined)scrollToSlide(idx);}
document.getElementById('btn-prev').addEventListener('click',()=>scrollToSlide(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>scrollToSlide(cur+1));
document.addEventListener('keydown',e=>{
  if(['ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();scrollToSlide(cur+1);}
  if(['ArrowUp','PageUp'].includes(e.key)){e.preventDefault();scrollToSlide(cur-1);}
  if(e.key==='Home'){e.preventDefault();scrollToSlide(0);}
  if(e.key==='End'){e.preventDefault();scrollToSlide(total-1);}
});
let wlk=false;
document.addEventListener('wheel',e=>{if(wlk)return;wlk=true;scrollToSlide(e.deltaY>0?cur+1:cur-1);setTimeout(()=>wlk=false,850);},{passive:true});
let tsY=0;
document.addEventListener('touchstart',e=>{tsY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{const dy=tsY-e.changedTouches[0].clientY;if(Math.abs(dy)>50)scrollToSlide(dy>0?cur+1:cur-1);},{passive:true});
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('is-visible');
      const i=parseInt(entry.target.dataset.index);
      if(!isNaN(i)){cur=i;updateUI();}
    }else{entry.target.classList.remove('is-visible');}
  });
},{threshold:0.5});
slideEls.forEach(el=>observer.observe(el));
updateUI();
</script>
