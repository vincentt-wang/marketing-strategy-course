<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台北大學社群行銷工作坊 Day 2 — Vincent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #fbfbfd;
  --ink: #1d1d1f;
  --mid: #86868b;
  --line: rgba(0,0,0,0.1);
  --white: #ffffff;
  --orange: #FF6B00;
  --orange-light: rgba(255,107,0,0.12);
  --orange-border: rgba(255,107,0,0.3);
  --red: #E6003A;
  --red-light: rgba(230,0,58,0.1);
  --blue: #0055CC;
  --blue-light: rgba(0,85,204,0.1);
  --glass-bg: rgba(255,255,255,0.65);
  --glass-border: rgba(255,255,255,0.8);
  --glass-blur: blur(16px) saturate(180%);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 50px rgba(0,0,0,0.12);
  --shadow-hover: 0 30px 60px rgba(0,0,0,0.16);
  --ease-out-back: cubic-bezier(0.34,1.56,0.64,1);
  --ease-smooth: cubic-bezier(0.4,0.0,0.2,1);
}

html { font-size: 18px; }

body {
  font-family: system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  font-size: 18px;
  color: var(--ink);
  background: var(--bg);
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* ── Scroll-Snap Container ── */
#slides-container {
  height: 100vh;
  width: 100vw;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  position: fixed;
  inset: 0;
  /* hide scrollbar */
  scrollbar-width: none;
}
#slides-container::-webkit-scrollbar { display: none; }

/* ── Slide Base ── */
.slide {
  height: 100vh;
  width: 100%;
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  padding: clamp(2rem,5vw,5rem) clamp(2rem,5vw,5rem) 60px;
  background: var(--bg);
}

/* SVG grid bg */
.slide::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(0,0,0,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.05) 1px, transparent 1px);
  background-size: clamp(40px,7vw,80px) clamp(40px,7vw,80px);
  z-index: 0;
}

/* ── Slide types ── */
.slide-dark {
  background: #0f0f0f;
}
.slide-dark::before {
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
}
.slide-dark::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,107,0,.12), transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(230,0,58,.08), transparent 50%);
  background-size: 200% 200%;
  animation: aurora 20s ease-in-out infinite;
  z-index: 0;
}

.slide-section {
  background: linear-gradient(135deg, #E6003A 0%, #FF4500 100%);
}
.slide-section::before {
  background-image:
    linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
}
.slide-section::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 100% 100% at 100% 0%, rgba(255,255,255,.08), transparent 50%);
  z-index: 0;
}

.slide-cover {
  background: #0f0f0f;
  text-align: center;
  justify-content: center;
}
.slide-cover::before {
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
}
.slide-cover::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 30% 30%, rgba(255,107,0,.15), transparent 60%),
    radial-gradient(ellipse 60% 80% at 70% 70%, rgba(230,0,58,.1), transparent 50%);
  background-size: 200% 200%;
  animation: aurora 20s ease-in-out infinite;
  z-index: 0;
}

.slide-close {
  background: #0f0f0f;
  text-align: center;
}
.slide-close::before {
  background-image:
    linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
}
.slide-close::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,107,0,.12), transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(230,0,58,.08), transparent 50%);
  background-size: 200% 200%;
  animation: aurora 20s ease-in-out infinite;
  z-index: 0;
}

.slide-warm { background: #faf8f4; }
.slide-cool { background: #f0f4fa; }

/* ── Inner container ── */
.inner {
  position: relative;
  z-index: 1;
  width: min(92vw, 1080px);
  max-height: calc(100vh - 100px);
  overflow: hidden;
  scrollbar-width: none;
}
.inner::-webkit-scrollbar { display: none; }

/* ── Slide content animation ── */
.slide-content {
  opacity: 0;
  transform: translateY(32px) scale(.98);
  transition: opacity .7s var(--ease-smooth), transform .7s var(--ease-out-back);
}
.slide.is-visible .slide-content {
  opacity: 1;
  transform: none;
}
.slide.is-visible .slide-content > * {
  animation: fade-up .6s var(--ease-out-back) both;
}
.slide.is-visible .slide-content > *:nth-child(1) { animation-delay: .05s; }
.slide.is-visible .slide-content > *:nth-child(2) { animation-delay: .12s; }
.slide.is-visible .slide-content > *:nth-child(3) { animation-delay: .19s; }
.slide.is-visible .slide-content > *:nth-child(4) { animation-delay: .26s; }
.slide.is-visible .slide-content > *:nth-child(5) { animation-delay: .33s; }
.slide.is-visible .slide-content > *:nth-child(6) { animation-delay: .40s; }

/* ── Animations ── */
@keyframes aurora {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes hero-drift {
  0%,100% { transform: scale(1) translate3d(0,0,0); opacity:.45; }
  50%      { transform: scale(1.04) translate3d(0,-1%,0); opacity:.65; }
}
@keyframes fade-up {
  from { opacity:0; transform:translateY(28px) scale(.98); }
  to   { opacity:1; transform:none; }
}

/* ── Typography ── */
.hero-txt { font-size:clamp(3.2rem,9vw,7.5rem); font-weight:800; line-height:1.02; letter-spacing:-0.03em; }
h1 { font-size:clamp(2.6rem,6.5vw,5.5rem); font-weight:800; line-height:1.05; letter-spacing:-0.025em; }
h2 { font-size:clamp(1.9rem,4vw,3.5rem); font-weight:700; line-height:1.08; letter-spacing:-0.02em; }
h3 { font-size:clamp(1.2rem,2vw,1.9rem); font-weight:600; line-height:1.2; }
p, li { font-size:clamp(1rem,1.6vw,1.3rem); line-height:1.75; color:var(--mid); }
strong { color:var(--ink); font-weight:700; }
.kicker { font-size:clamp(.7rem,.9vw,.85rem); font-weight:800; letter-spacing:.15em; text-transform:uppercase; }

/* Color overrides for dark/section slides */
.slide-dark h1, .slide-dark h2, .slide-dark h3, .slide-dark .hero-txt { color: #fff; }
.slide-dark p { color: rgba(255,255,255,.6); }
.slide-cover h1, .slide-cover h2, .slide-cover .hero-txt { color: #fff; }
.slide-cover p { color: rgba(255,255,255,.6); }
.slide-section h1, .slide-section h2, .slide-section h3 { color: #fff; }
.slide-section p { color: rgba(255,255,255,.75); }
.slide-close h1, .slide-close h2 { color: #fff; }
.slide-close p { color: rgba(255,255,255,.65); }

/* ── Gradient text ── */
.grad-text {
  background: linear-gradient(135deg, var(--ink) 0%, #555 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.grad-orange {
  background: linear-gradient(135deg, #FF6B00, #FF8C00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.grad-red {
  background: linear-gradient(135deg, #E6003A, #FF2055);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Badge ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-size: .68rem;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: .3em .9em;
  border-radius: 999px;
  margin-bottom: 1rem;
}
.badge-orange { background: var(--orange); color: #fff; }
.badge-red    { background: var(--red);    color: #fff; }
.badge-dark   { background: var(--ink);    color: #fff; }
.badge-glass  {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  color: var(--ink);
  border: 1px solid var(--glass-border);
}

/* ── Deck list ── */
.deck-list {
  list-style: none;
  margin-top: 1rem;
  display: flex;
  flex-direction: column;
  gap: .7rem;
}
.deck-list li {
  padding: .15rem 0 .15rem 1.4rem;
  position: relative;
  font-size: clamp(1rem,1.6vw,1.25rem);
  color: var(--mid);
}
.deck-list li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--orange);
  font-weight: 800;
}

/* ── Tip box ── */
.tip-box {
  background: rgba(255,107,0,.07);
  border-left: 4px solid var(--orange);
  border-radius: 0 8px 8px 0;
  padding: 1rem 1.2rem;
  font-size: clamp(.9rem,1.4vw,1.05rem);
  font-weight: 500;
  color: var(--ink);
  margin-top: 1.2rem;
}

/* ── Glass card ── */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: clamp(1.2rem,2.5vw,2rem);
  box-shadow: var(--shadow-md);
  transition: transform .3s var(--ease-out-back), box-shadow .3s ease;
}
.glass-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }

/* ── Compare ── */
.compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-top:1.5rem; }
.cmp-card { border-radius:14px; padding:1.6rem; }
.cmp-no  { background:rgba(0,0,0,.04); border:1.5px solid var(--line); }
.cmp-yes { background:rgba(255,107,0,.05); border:1.5px solid var(--orange); }
.cmp-card h3 { font-size:clamp(1rem,1.8vw,1.4rem); margin:.6rem 0 .5rem; }

/* ── Reveal card ── */
.reveal-card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  min-height: 200px;
  cursor: pointer;
  background: rgba(15,23,42,.92);
  box-shadow: 0 10px 30px rgba(0,0,0,.2);
  margin-top: 1.5rem;
}
.reveal-q-layer {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg,#1a1a2e,#0f0f0f);
  transition: opacity .6s ease, transform .4s ease;
  padding: 2rem;
}
.reveal-q-layer p {
  color: rgba(255,255,255,.9);
  font-size: clamp(1.1rem,2vw,1.4rem);
  font-weight: 600;
  line-height: 1.55;
  text-align: center;
}
.reveal-q-layer .hint {
  position: absolute;
  bottom: .8rem;
  right: 1rem;
  font-size: .65rem;
  color: rgba(255,255,255,.35);
}
.reveal-a-layer {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(135deg, #E6003A 0%, #FF4500 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
  font-size: clamp(1rem,1.6vw,1.2rem);
  font-weight: 600;
  color: #fff;
  line-height: 1.6;
}
.reveal-card.revealed .reveal-q-layer {
  opacity: 0;
  transform: scale(.95);
  pointer-events: none;
}
.reveal-card:not(.revealed):hover .reveal-q-layer {
  transform: translateY(-4px);
}

/* ── Timer ── */
.timer-wrap { display:flex; flex-direction:column; align-items:center; gap:1.5rem; margin-top:1.5rem; }
.timer-display {
  font-size: clamp(5rem,18vw,12rem);
  font-weight: 800;
  letter-spacing: -.04em;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  transition: color .5s;
  line-height: 1;
}
.timer-display.done { color: var(--red); }
.timer-btn {
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: .8rem 2.5rem;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .05em;
  transition: background .2s, transform .15s;
}
.timer-btn:hover { background: var(--orange); transform: scale(1.04); }
.timer-btn.running { background: var(--red); }
.timer-reset-btn {
  background: transparent;
  color: var(--mid);
  border: 1.5px solid var(--line);
  border-radius: 8px;
  padding: .8rem 2rem;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
}
.timer-reset-btn:hover { border-color: var(--orange); color: var(--orange); }

/* ── Checklist ── */
.cl-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1.5rem; }
.cl-item {
  display: flex;
  gap: .8rem;
  align-items: flex-start;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: .9rem 1.1rem;
  box-shadow: var(--shadow-sm);
  transition: transform .2s;
}
.cl-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.cl-box {
  width: 1.2rem;
  height: 1.2rem;
  border: 2px solid var(--line);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: .2rem;
}

/* ── Top Progress Bar ── */
#prog {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(0,0,0,.08);
  z-index: 900;
}
#prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF6B00, #E6003A);
  transition: width .4s ease;
  width: 0%;
}

/* ── Breadcrumb ── */
#breadcrumb {
  position: fixed;
  top: 3px;
  left: 50%;
  transform: translateX(-50%);
  font-size: .65rem;
  font-weight: 600;
  letter-spacing: .08em;
  color: var(--mid);
  background: rgba(251,251,253,.9);
  backdrop-filter: blur(8px);
  padding: .2rem .75rem;
  border-radius: 0 0 6px 6px;
  z-index: 901;
  white-space: nowrap;
  border: 1px solid rgba(0,0,0,.06);
  border-top: none;
}

/* ── Section Indicator Pill ── */
#sec-indicator {
  position: fixed;
  top: 12px;
  right: 16px;
  z-index: 910;
  padding: .4rem .9rem;
  border-radius: 999px;
  font-size: .75rem;
  font-weight: 700;
  color: var(--ink);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-sm);
  transition: all .25s var(--ease-smooth);
}

/* ── Vertical Page Indicator (thin progress bar) ── */
#page-indicator {
  position: fixed;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px;
  height: clamp(80px,15vh,200px);
  background: rgba(0,0,0,.1);
  border-radius: 2px;
  z-index: 900;
  overflow: hidden;
}
#page-indicator-fill {
  width: 100%;
  background: var(--orange);
  border-radius: 2px;
  transition: height .4s ease;
  height: 0%;
}

/* ── Nav Buttons ── */
.nav-btn {
  position: fixed;
  z-index: 900;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  color: var(--ink);
  transition: all .25s var(--ease-out-back);
}
.nav-btn:hover { transform: scale(1.12); color: var(--orange); box-shadow: var(--shadow-md); }
#btn-prev { bottom: 70px; right: 72px; }
#btn-next { bottom: 70px; right: 18px; }

/* ── Counter ── */
#counter {
  position: fixed;
  bottom: 70px;
  left: 32px;
  z-index: 900;
  font-size: .7rem;
  font-weight: 600;
  color: var(--mid);
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  padding: .3rem .8rem;
  border-radius: 999px;
  box-shadow: var(--shadow-sm);
}

/* ── Bottom Section Nav ── */
#sec-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(15,15,15,.92);
  backdrop-filter: var(--glass-blur);
  display: flex;
  align-items: stretch;
  z-index: 950;
  border-top: 1px solid rgba(255,255,255,.08);
}
.sec-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(.6rem,.85vw,.78rem);
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  cursor: pointer;
  border: none;
  background: transparent;
  border-right: 1px solid rgba(255,255,255,.06);
  transition: color .2s, background .2s;
  border-top: 2px solid transparent;
}
.sec-btn:last-child { border-right: none; }
.sec-btn:hover { color: #fff; background: rgba(255,107,0,.12); }
.sec-btn.active { color: #fff; background: rgba(255,107,0,.12); border-top: 2px solid var(--orange); }

/* ── Decorative bar ── */
.bar {
  width: 3.5rem;
  height: 4px;
  background: var(--red);
  border-radius: 2px;
  margin: .8rem 0 1.2rem;
}

/* ── Footer note ── */
.footer-note {
  margin-top: 1.4rem;
  padding: .8rem 1.2rem;
  border-left: 4px solid var(--orange);
  font-size: clamp(.85rem,1.3vw,1rem);
  color: var(--ink);
  background: var(--orange-light);
  border-radius: 0 8px 8px 0;
  font-weight: 500;
}

/* ── Body content ── */
.body-content p { margin-bottom: .4rem; }
.body-content p + p { margin-top: .4rem; }

/* ── HTML slide inner scrollable ── */
.slide-html .inner { overflow: auto; }

svg { overflow: visible; }
</style>
</head>

// ─────────────────────────────────────────────
// TIMER LOGIC
// ─────────────────────────────────────────────
function formatTime(s){
  const m = Math.floor(s/60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function toggleTimer(id, totalSecs){
  const dispEl = document.getElementById('td-'+id);
  const btnEl  = document.getElementById('tb-'+id);
  if(!dispEl || !btnEl) return;

  if(timers[id]){
    // pause
    clearInterval(timers[id]);
    delete timers[id];
    btnEl.textContent = '繼續';
    btnEl.classList.remove('running');
  } else {
    // start / resume
    const parts = dispEl.textContent.split(':');
    let remaining = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    if(remaining <= 0) { remaining = totalSecs; dispEl.textContent = formatTime(totalSecs); dispEl.classList.remove('done'); }
    btnEl.textContent = '暫停';
    btnEl.classList.add('running');
    timers[id] = setInterval(()=>{
      remaining--;
      if(dispEl) dispEl.textContent = formatTime(remaining);
      if(remaining <= 0){
        clearInterval(timers[id]);
        delete timers[id];
        dispEl.classList.add('done');
        btnEl.textContent = '完成';
        btnEl.classList.remove('running');
      }
    }, 1000);
  }
}

function resetTimer(id, totalSecs){
  if(timers[id]){ clearInterval(timers[id]); delete timers[id]; }
  const dispEl = document.getElementById('td-'+id);
  const btnEl  = document.getElementById('tb-'+id);
  if(dispEl){ dispEl.textContent = formatTime(totalSecs); dispEl.classList.remove('done'); }
  if(btnEl){ btnEl.textContent = '開始'; btnEl.classList.remove('running'); }
}

// ─────────────────────────────────────────────
// RENDER SLIDE
// ─────────────────────────────────────────────
function renderSlide(sd, idx){
  const section = document.createElement('section');
  section.className = 'slide';
  section.dataset.index = idx;
  section.dataset.id = sd.id;
  section.dataset.sec = sd.sec;
  section.dataset.subsec = sd.subsec;

  // Slide type classes
  switch(sd.type){
    case 'cover':   section.classList.add('slide-cover'); break;
    case 'section': section.classList.add('slide-section'); break;
    case 'dark':    section.classList.add('slide-dark'); break;
    case 'close':   section.classList.add('slide-close'); break;
    case 'html':    section.classList.add('slide-html'); break;
    case 'normal':
      if(idx % 5 === 1) section.classList.add('slide-warm');
      else if(idx % 5 === 3) section.classList.add('slide-cool');
      break;
    default: break;
  }

  // Badge class based on type
  const isDark = ['cover','dark','close','section'].includes(sd.type);
  const badgeClass = (sd.type === 'reveal') ? 'badge-red' :
                     (sd.type === 'timer')  ? 'badge-orange' :
                     isDark                 ? 'badge-glass' : 'badge-dark';

  let html = '';

  // Build badge
  if(sd.tag){
    html += `<div class="badge ${badgeClass}">${sd.tag}</div>`;
  }

  switch(sd.type){

    // ── COVER ──
    case 'cover':
      if(sd.title) html += `<h1>${sd.title}</h1>`;
      html += `<div class="bar" style="margin:1rem 0;background:var(--red)"></div>`;
      if(sd.content) html += `<p style="font-size:clamp(1.1rem,2vw,1.5rem)">${sd.content}</p>`;
      break;

    // ── SECTION ──
    case 'section':
      html += `<div class="bar" style="background:rgba(255,255,255,.6)"></div>`;
      if(sd.title) html += `<h1 style="color:#fff;margin-bottom:.8rem">${sd.title}</h1>`;
      if(sd.content) html += `<p style="color:rgba(255,255,255,.8);font-size:clamp(1.2rem,2.2vw,1.6rem);font-weight:600">${sd.content}</p>`;
      break;

    // ── DARK ──
    case 'dark':
      html += `<div class="bar"></div>`;
      if(sd.title) html += `<h1 style="color:#fff;margin-bottom:1rem">${sd.title}</h1>`;
      if(sd.content) html += `<p style="color:rgba(255,255,255,.6);font-size:clamp(1.05rem,1.8vw,1.35rem);max-width:700px">${sd.content}</p>`;
      break;

    // ── NORMAL ──
    case 'normal':
      html += `<div class="bar"></div>`;
      if(sd.title) html += `<h2 style="margin-bottom:.8rem">${sd.title}</h2>`;
      if(sd.content) html += `<div class="body-content" style="margin-bottom:.4rem">${sd.content}</div>`;
      if(sd.bullets && sd.bullets.length){
        html += `<ul class="deck-list">`;
        sd.bullets.forEach(b => { html += `<li>${b}</li>`; });
        html += `</ul>`;
      }
      if(sd.footer) html += `<div class="tip-box">${sd.footer}</div>`;
      break;

    // ── COMPARE ──
    case 'compare':
      html += `<div class="bar"></div>`;
      if(sd.title) html += `<h2 style="margin-bottom:1rem">${sd.title}</h2>`;
      html += `<div class="compare-grid">`;
      [sd.left, sd.right].forEach((side, si) => {
        const cls = si === 0 ? 'cmp-card cmp-no' : 'cmp-card cmp-yes';
        html += `<div class="${cls}">`;
        html += `<div style="font-size:2rem;margin-bottom:.5rem">${side.icon}</div>`;
        html += `<h3>${side.label}</h3>`;
        html += `<ul class="deck-list">`;
        side.items.forEach(it => { html += `<li>${it}</li>`; });
        html += `</ul></div>`;
      });
      html += `</div>`;
      break;

    // ── REVEAL ──
    case 'reveal':
      html += `<div class="bar"></div>`;
      if(sd.title) html += `<h2 style="margin-bottom:1rem">${sd.title}</h2>`;
      html += `<div class="reveal-card" onclick="this.classList.toggle('revealed')">`;
      html += `<div class="reveal-q-layer">`;
      html += `<p>${sd.question.replace(/\n/g,'<br>')}</p>`;
      html += `<span class="hint">點擊揭曉</span>`;
      html += `</div>`;
      html += `<div class="reveal-a-layer">${sd.answer.replace(/\n/g,'<br>')}</div>`;
      html += `</div>`;
      break;

    // ── TIMER ──
    case 'timer':
      html += `<div class="bar" style="margin:.8rem 0 1.2rem"></div>`;
      if(sd.title) html += `<h2 style="margin-bottom:.8rem">${sd.title}</h2>`;
      if(sd.content) html += `<p style="margin-bottom:1rem">${sd.content}</p>`;
      html += `<div class="timer-wrap">`;
      html += `<div class="timer-display" id="td-${sd.id}">${formatTime(sd.time)}</div>`;
      html += `<div style="display:flex;gap:1rem">`;
      html += `<button class="timer-btn" id="tb-${sd.id}" onclick="toggleTimer('${sd.id}',${sd.time})">開始</button>`;
      html += `<button class="timer-reset-btn" onclick="resetTimer('${sd.id}',${sd.time})">重設</button>`;
      html += `</div>`;
      html += `</div>`;
      break;

    // ── HTML ──
    case 'html':
      if(sd.title) html += `<h2 style="margin-bottom:.6rem">${sd.title}</h2>`;
      html += sd.content;
      break;

    // ── CLOSE ──
    case 'close':
      html += `<div class="bar" style="background:var(--red);margin:.8rem 0 1.4rem"></div>`;
      if(sd.title) html += `<h1 style="color:#fff;margin-bottom:1.2rem">${sd.title}</h1>`;
      if(sd.content) html += `<div style="max-width:640px;margin:0 auto 1.8rem;font-size:clamp(1rem,1.8vw,1.3rem);line-height:1.7">${sd.content}</div>`;
      if(sd.img){
        html += `<div style="margin:1.2rem auto;max-width:200px">
          <img src="${sd.img}" alt="QR Code" style="width:140px;height:140px;object-fit:cover;border-radius:8px;background:#fff;display:block;margin:0 auto"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div style="display:none;width:140px;height:140px;background:rgba(255,255,255,.1);border-radius:8px;margin:0 auto;align-items:center;justify-content:center;flex-direction:column;border:2px dashed rgba(255,255,255,.3)">
            <div style="font-size:.7rem;color:rgba(255,255,255,.5);text-align:center;padding:.5rem">QR Code</div>
          </div>
        </div>`;
      }
      if(sd.cta) html += `<p style="font-size:.85rem;margin-top:.6rem;color:rgba(255,255,255,.5)">${sd.cta}</p>`;
      break;
  }

  // Wrap in slide-content div
  const inner = document.createElement('div');
  inner.className = 'inner slide-content';
  inner.innerHTML = html;
  section.appendChild(inner);
  return section;
}

// ─────────────────────────────────────────────
// BUILD SLIDES
// ─────────────────────────────────────────────
const slideEls = [];
slidesData.forEach((sd, idx) => {
  const el = renderSlide(sd, idx);
  container.appendChild(el);
  slideEls.push(el);
});

// ─────────────────────────────────────────────
// UI UPDATE
// ─────────────────────────────────────────────
function setCurrentSlide(idx){
  cur = Math.max(0, Math.min(idx, total - 1));
  updateUI();
}

function updateUI(){
  const sd = slidesData[cur];
  const pct = total > 1 ? (cur / (total - 1)) * 100 : 0;

  // Progress bar
  document.getElementById('prog-fill').style.width = pct + '%';

  // Page indicator fill
  document.getElementById('page-indicator-fill').style.height = pct + '%';

  // Counter
  document.getElementById('counter').textContent = `${cur + 1} / ${total}`;

  // Breadcrumb
  document.getElementById('breadcrumb').textContent = `Section ${sd.sec}  ·  ${sd.subsec}`;

  // Section indicator
  document.getElementById('sec-indicator').textContent = secNames[sd.sec] || '';

  // Section nav buttons
  document.querySelectorAll('.sec-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.sec) === sd.sec);
  });
}

// ─────────────────────────────────────────────
// SCROLL & NAVIGATION
// ─────────────────────────────────────────────
function scrollToSlide(idx){
  idx = Math.max(0, Math.min(idx, total - 1));
  slideEls[idx]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setCurrentSlide(idx);
}

function jumpToSection(sec){
  const idx = secStarts[sec];
  if(idx !== undefined) scrollToSlide(idx);
}

// Nav buttons
document.getElementById('btn-prev').addEventListener('click', () => scrollToSlide(cur - 1));
document.getElementById('btn-next').addEventListener('click', () => scrollToSlide(cur + 1));

// Keyboard
document.addEventListener('keydown', e => {
  if(['ArrowDown',' ','PageDown'].includes(e.key)){
    e.preventDefault();
    scrollToSlide(Math.min(cur + 1, total - 1));
  }
  if(['ArrowUp','PageUp'].includes(e.key)){
    e.preventDefault();
    scrollToSlide(Math.max(cur - 1, 0));
  }
  if(e.key === 'Home'){ e.preventDefault(); scrollToSlide(0); }
  if(e.key === 'End'){  e.preventDefault(); scrollToSlide(total - 1); }
});

// Wheel with cooldown
let wlk = false;
document.addEventListener('wheel', e => {
  if(wlk) return;
  wlk = true;
  scrollToSlide(e.deltaY > 0 ? Math.min(cur + 1, total - 1) : Math.max(cur - 1, 0));
  setTimeout(() => wlk = false, 900);
}, { passive: true });

// Touch
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dy = touchStartY - e.changedTouches[0].clientY;
  if(Math.abs(dy) > 50){
    scrollToSlide(dy > 0 ? Math.min(cur + 1, total - 1) : Math.max(cur - 1, 0));
  }
}, { passive: true });

// ─────────────────────────────────────────────
// INTERSECTION OBSERVER — triggers .is-visible
// ─────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('is-visible');
      const idx = parseInt(entry.target.dataset.index);
      if(!isNaN(idx)){
        cur = idx;
        updateUI();
      }
    } else {
      entry.target.classList.remove('is-visible');
    }
  });
}, { threshold: 0.55 });

slideEls.forEach(el => observer.observe(el));

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
updateUI();
</script>
</body>
</html>
