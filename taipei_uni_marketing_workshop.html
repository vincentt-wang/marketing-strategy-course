<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>台北大學社群行銷工作坊 — Vincent</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;--ink:#111;--red:#E6003A;--blue:#0055CC;
  --mid:#555;--line:#D5D5D0;--white:#fff;
  --pad:clamp(2rem,5vw,5rem);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  color:var(--ink);}

/* ── Progress ── */
#prog{position:fixed;top:0;left:0;right:0;height:3px;background:var(--line);z-index:900}
#prog-fill{height:100%;background:var(--red);width:0;transition:width .4s ease}

/* ── Stage ── */
#stage{width:100vw;height:calc(100vh - 48px);position:relative;overflow:hidden}

/* ── Slide base ── */
.slide{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding:var(--pad) var(--pad) 2rem;
  opacity:0;transform:translateY(32px);pointer-events:none;
  transition:opacity .45s ease,transform .45s ease;
  z-index:0;
}
.slide.active{opacity:1;transform:none;pointer-events:all;z-index:2}
.slide.exit{opacity:0;transform:translateY(-32px);z-index:1}

/* ── Grid bg ── */
.slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),
    linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:clamp(36px,7vw,72px) clamp(36px,7vw,72px);
  opacity:.15;
}

.inner{position:relative;z-index:1;width:min(92vw,1080px);max-height:calc(100vh - 100px);overflow:hidden}
.tag{display:inline-block;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;
  font-weight:700;padding:.25em .75em;border-radius:2px;margin-bottom:1rem}
.tag-red{background:var(--red);color:#fff}
.tag-blue{background:var(--blue);color:#fff}
.tag-dark{background:var(--ink);color:#fff}
.tag-ghost{border:1.5px solid var(--ink);color:var(--ink);background:transparent}
h1{font-size:clamp(2.2rem,7vw,6rem);font-weight:800;line-height:1.02;letter-spacing:-.03em}
h2{font-size:clamp(1.6rem,4vw,3.4rem);font-weight:700;line-height:1.08;letter-spacing:-.02em}
h3{font-size:clamp(1rem,2.2vw,1.8rem);font-weight:600;line-height:1.2}
p{font-size:clamp(.85rem,1.4vw,1.1rem);line-height:1.7;color:var(--mid)}
strong{color:var(--ink);font-weight:700}
.accent{color:var(--red)}
.bar{width:3rem;height:4px;background:var(--red);border-radius:2px;margin:1rem 0}
.row{display:flex;gap:1.5rem}
.col{flex:1}
.card{background:var(--white);border:1px solid var(--line);border-radius:4px;
  padding:clamp(1rem,2vw,1.8rem);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.card-red{border-color:var(--red);background:rgba(230,0,58,.04)}
.card-blue{border-color:var(--blue);background:rgba(0,85,204,.04)}
ul{list-style:none;display:flex;flex-direction:column;gap:.6rem;margin-top:.8rem}
ul li{font-size:clamp(.8rem,1.3vw,1rem);color:var(--mid);padding-left:1.2rem;position:relative}
ul li::before{content:'→';position:absolute;left:0;color:var(--red);font-weight:700}
.big{font-size:clamp(3rem,10vw,9rem);font-weight:800;line-height:1;letter-spacing:-.04em;color:var(--red)}

/* ── Cover dark ── */
.dark{background:var(--ink)}
.dark::before{opacity:.06}
.dark h1,.dark h2,.dark h3{color:#fff}
.dark p{color:rgba(255,255,255,.55)}
.dark .bar{background:var(--red)}

/* ── Section title ── */
.sec-slide{background:var(--red)}
.sec-slide::before{opacity:.07}
.sec-slide h1,.sec-slide h2{color:#fff}
.sec-slide p{color:rgba(255,255,255,.6)}

/* ── Reveal ── */
.reveal-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem}
.reveal-card{
  border-radius:6px;padding:2rem;min-height:160px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  background:var(--ink);border:2px solid var(--ink);
  transition:transform .2s;
}
.reveal-card:hover{transform:scale(1.02)}
.reveal-q{color:rgba(255,255,255,.9);font-size:clamp(1rem,2vw,1.4rem);font-weight:700;text-align:center}
.reveal-a{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  padding:1.5rem;background:var(--red);
  opacity:0;transform:scale(.92);
  transition:opacity .35s ease,transform .35s ease;
  font-size:clamp(.9rem,1.5vw,1.1rem);color:#fff;text-align:center;font-weight:600;
  pointer-events:none;
}
.reveal-card.revealed .reveal-a{opacity:1;transform:scale(1)}
.reveal-hint{font-size:.7rem;color:rgba(255,255,255,.4);position:absolute;bottom:.6rem;right:.8rem}

/* ── Timer ── */
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:1.5rem;margin-top:2rem}
.timer-display{
  font-size:clamp(4rem,16vw,12rem);font-weight:800;letter-spacing:-.04em;
  font-variant-numeric:tabular-nums;color:var(--ink);
  transition:color .5s;
}
.timer-display.done{color:var(--red)}
.timer-btn{
  background:var(--ink);color:#fff;border:none;border-radius:4px;
  padding:.8rem 2.5rem;font-size:1rem;font-weight:700;cursor:pointer;
  letter-spacing:.05em;transition:background .2s;
}
.timer-btn:hover{background:var(--red)}
.timer-btn.running{background:var(--red)}

/* ── Image ── */
.img-wrap{display:flex;align-items:center;justify-content:center;margin-top:1.5rem}
.img-wrap img{max-height:min(50vh,360px);border-radius:6px;object-fit:cover}

/* ── Checklist ── */
.checklist{display:flex;flex-direction:column;gap:.75rem;margin-top:1.5rem}
.cl-item{display:flex;gap:.9rem;align-items:flex-start;
  background:var(--white);border:1px solid var(--line);border-radius:4px;padding:.9rem 1.2rem}
.cl-box{width:1.3rem;height:1.3rem;border:2px solid var(--line);border-radius:3px;flex-shrink:0;margin-top:.15rem}
.cl-text p{font-size:.9rem}

/* ── Pitch steps ── */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:1.5rem}
.step{border-radius:4px;padding:1.3rem 1rem;text-align:center}
.step-num{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700;
  margin-bottom:.5rem;opacity:.7}
.step-icon{font-size:2rem;margin-bottom:.5rem}
.step h3{font-size:clamp(.85rem,1.4vw,1.05rem)}
.step p{font-size:.78rem;margin-top:.3rem}
.s1{background:#FFF5F7;border:1.5px solid #FFBCCC}
.s2{background:#FFF8F0;border:1.5px solid #FFCC99}
.s3{background:#F0F7FF;border:1.5px solid #B3CCFF}
.s4{background:#F0FFF6;border:1.5px solid #99DDB8}

/* ── Compare ── */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem}
.cmp-no{border:2px solid var(--line);border-radius:4px;padding:1.5rem}
.cmp-yes{border:2px solid var(--red);border-radius:4px;padding:1.5rem;background:rgba(230,0,58,.04)}
.cmp-icon{font-size:1.8rem;margin-bottom:.5rem}

/* ── Section Nav ── */
#sec-nav{
  position:fixed;bottom:0;left:0;right:0;height:48px;
  background:var(--ink);display:flex;align-items:stretch;z-index:950;
}
.sec-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:clamp(.6rem,.9vw,.75rem);font-weight:600;letter-spacing:.06em;
  color:rgba(255,255,255,.45);cursor:pointer;border:none;background:transparent;
  border-right:1px solid rgba(255,255,255,.08);
  transition:color .2s,background .2s;text-transform:uppercase;
  padding:0 .5rem;text-align:center;
}
.sec-btn:last-child{border-right:none}
.sec-btn:hover,.sec-btn.active{color:#fff;background:rgba(255,255,255,.08)}
.sec-btn.active{border-top:2px solid var(--red)}

/* ── Counter / Nav arrows ── */
#counter{
  position:fixed;bottom:58px;left:var(--pad);
  font-size:.65rem;letter-spacing:.12em;color:var(--mid);z-index:900;
  font-variant-numeric:tabular-nums;
}
.nav-btn{
  position:fixed;bottom:58px;background:var(--white);border:1px solid var(--line);
  width:2.2rem;height:2.2rem;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;z-index:900;font-size:.95rem;color:var(--ink);
  transition:background .2s;
}
.nav-btn:hover{background:var(--ink);color:#fff}
#btn-prev{right:5.5rem}
#btn-next{right:2rem}

@media(max-width:640px){
  .row,.compare,.steps,.reveal-wrap{flex-direction:column;grid-template-columns:1fr}
  .steps{grid-template-columns:1fr 1fr}
}
@media(prefers-reduced-motion:reduce){.slide,.reveal-a,.timer-display{transition:none!important}}
</style>
</head>

// ── Renderer ──────────────────────────────────────────────────────────────

function renderSlide(data) {
  const el = document.createElement('section');
  el.className = 'slide';
  el.dataset.id = data.id;
  el.dataset.sec = data.sec;

  let html = '';

  if (data.type === 'cover') {
    el.classList.add('dark');
    html = `<div class="inner" style="text-align:center">
      <div class="tag tag-red">${data.tag}</div>
      <h1 style="margin-top:1rem">${data.title}</h1>
      <div class="bar" style="margin:1.5rem auto"></div>
      <p style="font-size:clamp(1rem,2vw,1.4rem);color:rgba(255,255,255,.6)">${data.content}</p>
    </div>`;
  }
  else if (data.type === 'section') {
    el.classList.add('sec-slide');
    html = `<div class="inner" style="text-align:center">
      <div class="tag" style="background:rgba(255,255,255,.2);color:#fff">${data.tag}</div>
      <h1 style="margin-top:1rem;color:#fff">${data.title}</h1>
      <div class="bar" style="margin:1.5rem auto;background:#fff;opacity:.6"></div>
      <p style="font-size:clamp(1.1rem,2.5vw,1.8rem);color:rgba(255,255,255,.7)">${data.content}</p>
    </div>`;
  }
  else if (data.type === 'speaker') {
    el.classList.add('dark');
    html = `<div class="inner" style="text-align:center">
      <div class="tag tag-red">${data.tag}</div>
      <h1 style="margin-top:1rem;color:#fff">${data.title}</h1>
      <div class="bar" style="margin:1.5rem auto"></div>
      <p style="font-size:clamp(1rem,2vw,1.4rem)">${data.content}</p>
      ${data.sub ? `<p style="margin-top:.5rem;color:rgba(255,255,255,.4);letter-spacing:.1em;font-size:.85rem">${data.sub}</p>` : ''}
    </div>`;
  }
  else if (data.type === 'image') {
    html = `<div class="inner" style="text-align:center">
      <div class="tag tag-dark">${data.tag}</div>
      <div class="img-wrap"><img src="${data.img}" alt="${data.title}" onerror="this.style.display='none'"></div>
      ${data.content ? `<div style="margin-top:1rem">${data.content}</div>` : ''}
    </div>`;
  }
  else if (data.type === 'big') {
    html = `<div class="inner">

      <div class="tag tag-red">${data.tag}</div>
      <h2 style="margin-top:.5rem">${data.title}</h2>
      <p style="margin-top:.5rem">${data.content}</p>
      <div class="timer-wrap">
        <div class="timer-display" id="${id}-display">${formatTime(data.time)}</div>
        <button class="timer-btn" id="${id}-btn" onclick="toggleTimer('${id}',${data.time})">Start</button>

    </div>`;
  }
  else if (data.type === 'steps') {
    html = `<div class="inner">
      <div class="tag tag-red">${data.tag}</div>
      <h2 style="margin-top:.5rem">${data.title}</h2>
      <p style="margin-top:.5rem">${data.content}</p>
      <div class="steps">
        <div class="step s1"><div class="step-num">Step 01</div><div class="step-icon">🪝</div><h3>Hook</h3><p>鉤子<br>抓住注意力</p></div>
        <div class="step s2"><div class="step-num">Step 02</div><div class="step-icon">😣</div><h3>Pain</h3><p>痛點<br>製造共鳴</p></div>
        <div class="step s3"><div class="step-num">Step 03</div><div class="step-icon">💡</div><h3>Solution</h3><p>方案<br>展示視覺</p></div>
        <div class="step s4"><div class="step-num">Step 04</div><div class="step-icon">🎯</div><h3>CTA</h3><p>行動呼籲<br>下一步</p></div>
      </div>
    </div>`;
  }
  else if (data.type === 'checklist') {
    html = `<div class="inner">
      <div class="tag tag-dark">${data.tag}</div>
      <h2 style="margin-top:.5rem">${data.title}</h2>
      <div class="checklist">
        ${data.items.map(item=>`
          <div class="cl-item">
            <div class="cl-box"></div>
            <div class="cl-text"><p>${item}</p></div>

  }
  else if (data.type === 'close') {
    el.classList.add('dark');
    html = `<div class="inner">
      <div class="tag tag-red">${data.tag}</div>

      <div class="bar"></div>
      ${data.content}
      <div style="margin-top:1.5rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap">
        <div style="background:var(--white);border-radius:6px;padding:1.2rem;text-align:center;min-width:140px">
          <img src="${data.img}" alt="QR Code" style="max-width:120px;display:block;margin:0 auto"
            onerror="this.outerHTML='<div style=\'width:120px;height:120px;background:#eee;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#999;text-align:center\'>LinkedIn<br>QR Code</div>'">
          <p style="margin-top:.5rem;font-size:.75rem;color:var(--mid)">${data.cta}</p>

        <div style="flex:1">
          <p style="color:rgba(255,255,255,.5);font-size:.8rem;margin-bottom:.5rem">RECALL</p>
          <p>① 我的 HXC 是 ＿＿＿</p>

// ── Timer logic ───────────────────────────────────────────────────────────
const timers = {};
function formatTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function toggleTimer(id, total) {
  const disp = document.getElementById(id+'-display');
  const btn  = document.getElementById(id+'-btn');
  if (!disp || !btn) return;

  if (timers[id]?.running) {
    clearInterval(timers[id].interval);
    timers[id].running = false;
    btn.textContent = 'Resume';
    btn.classList.remove('running');
  } else {
    if (!timers[id]) timers[id] = {remaining: total};
    timers[id].running = true;
    btn.textContent = 'Pause';
    btn.classList.add('running');
    timers[id].interval = setInterval(() => {
      timers[id].remaining--;
      if (disp) disp.textContent = formatTime(timers[id].remaining);
      if (timers[id].remaining <= 0) {
        clearInterval(timers[id].interval);
        timers[id].running = false;
        if (disp) { disp.textContent = '00:00'; disp.classList.add('done'); }
        if (btn)  { btn.textContent = 'Reset'; }
      }
    }, 1000);
  }

  // reset if already done
  if (disp.classList.contains('done')) {
    clearInterval(timers[id]?.interval);
    timers[id] = {remaining: total, running: false};
    disp.textContent = formatTime(total);
    disp.classList.remove('done');
    btn.textContent = 'Start';
    btn.classList.remove('running');
  }
}

// ── Nav & render ─────────────────────────────────────────────────────────
const stage   = document.getElementById('stage');
const fill    = document.getElementById('prog-fill');
const counter = document.getElementById('counter');
const secBtns = document.querySelectorAll('.sec-btn');
const total   = slidesData.length;
let current   = 0;
let animating = false;

// Pre-render all slides
const slideEls = slidesData.map(d => {
  const el = renderSlide(d);
  stage.appendChild(el);
  return el;
});

function goTo(idx, dir=1) {
  if (animating || idx === current || idx < 0 || idx >= total) return;
  animating = true;

  const out = slideEls[current];
  const inn = slideEls[idx];
  current = idx;

  fill.style.width = ((current+1)/total*100)+'%';
  counter.textContent = (current+1)+' / '+total;
  secBtns.forEach(b => b.classList.toggle('active', +b.dataset.sec === slidesData[current].sec));

  inn.style.transition = 'none';
  inn.style.transform  = dir===1 ? 'translateY(32px)' : 'translateY(-32px)';
  inn.style.opacity    = '0';
  inn.style.zIndex     = '3';
  out.style.zIndex     = '2';

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    inn.style.transition = '';
    inn.style.transform  = '';
    inn.style.opacity    = '';
    inn.classList.add('active');
    out.classList.add('exit');
    setTimeout(()=>{
      out.classList.remove('active','exit');
      out.style.zIndex = '';
      inn.style.zIndex = '';
      animating = false;
    }, 480);
  }));
}

function next() { goTo(current+1, 1); }
function prev() { goTo(current-1, -1); }

// Section jump
secBtns.forEach(btn => {
  btn.addEventListener('click', ()=>{
    const sec = +btn.dataset.sec;
    const idx = slidesData.findIndex(s => s.sec === sec);
    if (idx !== -1) goTo(idx, sec > slidesData[current].sec ? 1 : -1);
  });
});

document.getElementById('btn-next').addEventListener('click', next);
document.getElementById('btn-prev').addEventListener('click', prev);

document.addEventListener('keydown', e => {
  if (['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)) { e.preventDefault(); next(); }
  if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) { e.preventDefault(); prev(); }
});

let wheelLock = false;
document.addEventListener('wheel', e => {
  e.preventDefault();
  if (wheelLock) return;
  wheelLock = true;
  e.deltaY > 0 ? next() : prev();
  setTimeout(()=>{ wheelLock=false; }, 700);
}, {passive:false});

let ty=0,tx=0;
document.addEventListener('touchstart', e=>{ ty=e.touches[0].clientY; tx=e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend', e=>{
  const dy=ty-e.changedTouches[0].clientY, dx=tx-e.changedTouches[0].clientX;
  if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>40){ dy>0?next():prev(); }
  else if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){ dx>0?next():prev(); }
},{passive:true});

// init
goTo(0);
setTimeout(()=>{ slideEls[0].style.zIndex=''; }, 500);

// Verify count in console
console.log(`✓ 共 ${slidesData.length} 頁，應為 66 頁`);
</script>
